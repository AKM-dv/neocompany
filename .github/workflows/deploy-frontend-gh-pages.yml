# Requires: Repo → Settings → Pages → Source: GitHub Actions.
# Set Repository variable VITE_API_URL to your public API origin (e.g. https://api.example.com).

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Default base path = /repo-name/ for project pages. Override with repo variable VITE_BASE_PATH (use / for username.github.io root sites).
      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_OVERRIDE: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$BASE_OVERRIDE" ]; then
            export VITE_BASE_PATH="$BASE_OVERRIDE"
          else
            export VITE_BASE_PATH="/${REPO_NAME}/"
          fi
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
